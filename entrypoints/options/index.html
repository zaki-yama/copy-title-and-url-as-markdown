<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Options</title>
    <script>
      chrome.storage.local.get({ theme: "system" }, function (r) {
        if (
          r.theme === "dark" ||
          (r.theme === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
